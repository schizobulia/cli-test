name: HBuilderX CI Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-hello-uni-app-x-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      HBUILDERX_LINUX_URL: https://download1.dcloud.net.cn/download/HBuilderX.5.12.2026060409-alpha.linux_x64.full.tar.gz
      SAMPLE_TARBALL_URL: https://github.com/dcloudio/hello-uni-app-x/archive/refs/heads/alpha.tar.gz
      DART_SASS_PLUGIN_ZIP: .github/hbuilderx-plugins/compile-dart-sass_0.0.3.zip
      GRADLE_VERSION: "8.7"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        shell: bash
        run: |
          set -euo pipefail
          uname -a
          lsb_release -a || true

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          packages=(
            curl
            gzip
            libatk-bridge2.0-0
            libgbm1
            libgtk-3-0
            libnss3
            libxss1
            openjdk-17-jdk
            tar
            unzip
          )

          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            packages+=(libasound2t64)
          else
            packages+=(libasound2)
          fi

          sudo apt-get install -y "${packages[@]}"
          java -version

      - name: Prepare Android and Gradle paths
        shell: bash
        run: |
          set -euo pipefail

          gradle_zip="$RUNNER_TEMP/gradle-${GRADLE_VERSION}-bin.zip"
          gradle_root="$RUNNER_TEMP/gradle"
          curl --fail --location --retry 3 --retry-delay 5 \
            --output "$gradle_zip" \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q "$gradle_zip" -d "$gradle_root"

          gradle_home="$gradle_root/gradle-${GRADLE_VERSION}"
          gradle_bin="$gradle_home/bin/gradle"
          echo "$gradle_home/bin" >> "$GITHUB_PATH"
          echo "GRADLE_HOME=$gradle_home" >> "$GITHUB_ENV"

          android_home="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          if [[ -x "$android_home/cmdline-tools/latest/bin/sdkmanager" ]]; then
            yes | "$android_home/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
            "$android_home/cmdline-tools/latest/bin/sdkmanager" \
              "platform-tools" \
              "platforms;android-34" \
              "build-tools;34.0.0"
          else
            echo "sdkmanager was not found under $android_home; using existing Android SDK path."
          fi

          java_home="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
          sudo ln -sf "$(command -v java)" /usr/local/bin/java.exe
          sudo ln -sf "$(command -v javac)" /usr/local/bin/javac.exe

          # HBuilderX 5.12 may not support `cli config set`, so write settings directly.
          settings_dir="$HOME/.local/share/HBuilder X/user"
          mkdir -p "$settings_dir"
          cat > "$settings_dir/settings.json" <<EOF
          {
            "uts-development-android.gradleHome": "$gradle_bin",
            "uts-development-android.sdkDir": "$android_home",
            "uts-development-android.javaHome": "$java_home"
          }
          EOF

          "$gradle_bin" -v
          echo "ANDROID_HOME=$android_home" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$android_home" >> "$GITHUB_ENV"
          echo "JAVA_HOME=$java_home" >> "$GITHUB_ENV"

      - name: Download and install HBuilderX Linux Alpha
        shell: bash
        run: |
          set -euo pipefail

          tarball="$RUNNER_TEMP/HBuilderX-linux-x64.tar.gz"
          install_root="$RUNNER_TEMP/hbuilderx-linux"
          mkdir -p "$install_root"

          curl --fail --location --retry 3 --retry-delay 5 \
            --output "$tarball" \
            "$HBUILDERX_LINUX_URL"

          tar -xzf "$tarball" -C "$install_root"
          cli_path="$(find "$install_root" -type f -name cli -print -quit)"
          if [[ -z "$cli_path" ]]; then
            echo "HBuilderX Linux cli was not found after extraction."
            find "$install_root" -maxdepth 3 -print
            exit 1
          fi

          chmod +x "$cli_path"
          hbuilderx_root="$(dirname "$cli_path")"
          echo "HBUILDERX_ROOT=$hbuilderx_root" >> "$GITHUB_ENV"
          echo "HBUILDERX_CLI=$cli_path" >> "$GITHUB_ENV"
          "$cli_path" ver

      - name: Patch uts-development-android aapt2 for Linux
        shell: bash
        run: |
          set -euo pipefail

          sdk_aapt2="$(find "$ANDROID_HOME/build-tools" -path '*/aapt2' -type f | sort -V | tail -n 1)"
          plugin_aapt2="$HBUILDERX_ROOT/plugins/uts-development-android/static/macosx/aapt2"

          if [[ -z "$sdk_aapt2" || ! -x "$sdk_aapt2" ]]; then
            echo "Linux aapt2 was not found under $ANDROID_HOME/build-tools."
            find "$ANDROID_HOME/build-tools" -name aapt2 -type f -print || true
            exit 1
          fi

          if [[ ! -f "$plugin_aapt2" ]]; then
            echo "Plugin aapt2 path was not found: $plugin_aapt2"
            find "$HBUILDERX_ROOT/plugins/uts-development-android" -path '*aapt2*' -print || true
            exit 1
          fi

          cp "$sdk_aapt2" "$plugin_aapt2"
          chmod +x "$plugin_aapt2"

          echo "Patched uts-development-android aapt2 with: $sdk_aapt2"
          file "$plugin_aapt2"
          "$plugin_aapt2" version || true

      - name: Install compile-dart-sass plugin
        shell: bash
        run: |
          set -euo pipefail

          plugin_zip="$GITHUB_WORKSPACE/$DART_SASS_PLUGIN_ZIP"
          plugin_dir="$HBUILDERX_ROOT/plugins/compile-dart-sass"

          if [[ ! -f "$plugin_zip" ]]; then
            echo "Plugin zip was not found: $plugin_zip"
            exit 1
          fi

          rm -rf "$plugin_dir"
          mkdir -p "$plugin_dir"
          unzip -q "$plugin_zip" -d "$plugin_dir"

          # Some marketplace plugins require dependencies to be installed after unzip.
          if [[ -f "$plugin_dir/package.json" && ! -d "$plugin_dir/node_modules" ]]; then
            cd "$plugin_dir"
            if [[ -x "$HBUILDERX_ROOT/plugins/npm/npm" ]]; then
              "$HBUILDERX_ROOT/plugins/npm/npm" install
            elif [[ -x "$HBUILDERX_ROOT/npm/npm" ]]; then
              "$HBUILDERX_ROOT/npm/npm" install
            else
              npm install
            fi
          fi

          test -f "$plugin_dir/package.json"
          echo "Installed compile-dart-sass plugin to $plugin_dir"

      - name: Download hello-uni-app-x alpha branch
        shell: bash
        run: |
          set -euo pipefail

          tarball="$RUNNER_TEMP/hello-uni-app-x-alpha.tar.gz"
          project_path="$RUNNER_TEMP/hello-uni-app-x"
          mkdir -p "$project_path"

          curl --fail --location --retry 3 --retry-delay 5 \
            --output "$tarball" \
            "$SAMPLE_TARBALL_URL"

          tar -xzf "$tarball" -C "$project_path" --strip-components=1
          test -f "$project_path/manifest.json"
          echo "PROJECT_PATH=$project_path" >> "$GITHUB_ENV"

      - name: Compile app-android with HBuilderX Linux CLI
        shell: bash
        run: |
          set -euo pipefail

          open_log="$RUNNER_TEMP/hbuilderx-linux-open.log"

          python3 - "$HBUILDERX_CLI" "$open_log" <<'PY'
          import subprocess
          import sys

          cli, log_path = sys.argv[1], sys.argv[2]
          with open(log_path, "wb") as log:
              process = subprocess.Popen(
                  [cli, "open"],
                  stdout=log,
                  stderr=subprocess.STDOUT,
                  start_new_session=True,
              )
              try:
                  code = process.wait(timeout=90)
              except subprocess.TimeoutExpired:
                  print("cli open is still running; continuing after startup timeout.")
                  sys.exit(0)
              sys.exit(code)
          PY

          for attempt in {1..60}; do
            if "$HBUILDERX_CLI" project list >/tmp/hbuilderx-linux-project-list.log 2>&1; then
              cat /tmp/hbuilderx-linux-project-list.log
              break
            fi

            if [[ "$attempt" -eq 60 ]]; then
              cat "$open_log" || true
              cat /tmp/hbuilderx-linux-project-list.log || true
              echo "HBuilderX Linux CLI did not become ready in time."
              exit 1
            fi

            sleep 2
          done

          "$HBUILDERX_CLI" project open --path "$PROJECT_PATH" \
            2>&1 | tee "$RUNNER_TEMP/hbuilderx-linux-project-open.log"

          compile_marker="$RUNNER_TEMP/hbuilderx-linux-compile-start"
          launch_log="$RUNNER_TEMP/hbuilderx-linux-launch.log"
          touch "$compile_marker"

          set +e
          "$HBUILDERX_CLI" launch app-android \
            --project "$PROJECT_PATH" \
            --compile true \
            --ui false \
            2>&1 | tee "$launch_log"
          launch_status="${PIPESTATUS[0]}"
          set -e

          echo "::group::Recent HBuilderX Linux local logs"
          found_logs=0
          for log_root in "$HOME/.local/share/HBuilder X" "$HOME/.config" "$HOME/.cache"; do
            [[ -d "$log_root" ]] || continue

            while IFS= read -r log_file; do
              found_logs=1
              echo "--- $log_file"
              tail -n 200 "$log_file" || true
            done < <(
              find "$log_root" -type f -newer "$compile_marker" -print 2>/dev/null \
                | grep -Ei 'hbuilderx|dcloud|uni-app|uniapp' \
                | grep -Ei '\.(log|txt)$' \
                | head -n 20
            )
          done

          if [[ "$found_logs" -eq 0 ]]; then
            echo "No recent HBuilderX Linux local log files found."
          fi
          echo "::endgroup::"

          exit "$launch_status"

      - name: Upload HBuilderX Linux logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hbuilderx-linux-logs
          path: |
            ${{ runner.temp }}/hbuilderx-linux-*.log
          if-no-files-found: ignore

      - name: Quit HBuilderX Linux CLI
        if: always()
        shell: bash
        run: |
          if [[ -n "${HBUILDERX_CLI:-}" && -x "$HBUILDERX_CLI" ]]; then
            "$HBUILDERX_CLI" app quit || true
          fi
